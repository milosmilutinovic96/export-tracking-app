@if(supplyItems() && supplyItems().length) {

<div class="table-container">
    <div class="table-actions">
        <button mat-raised-button color="primary" (click)="exportToExcelFormatted()" class="export-btn">
            <mat-icon>download</mat-icon>
            Eksportuj u Excel
        </button>
    </div>

    <div class="mat-elevation-z8">
        <table mat-table class="mat-hover" multiTemplateDataRows [dataSource]="supplyItems()">
            <ng-container matColumnDef="elementItemCode">
                <th mat-header-cell *matHeaderCellDef>Šifra Artikla</th>
                <td mat-cell *matCellDef="let supplyItem">{{supplyItem.elementItemCode}}</td>
            </ng-container>

            <ng-container matColumnDef="elementItemName">
                <th mat-header-cell *matHeaderCellDef>Naziv Artikla</th>
                <td mat-cell *matCellDef="let supplyItem">{{supplyItem.elementItemName}}</td>
            </ng-container>

            <ng-container matColumnDef="unitOfMeasure">
                <th mat-header-cell *matHeaderCellDef>Jed. mere</th>
                <td mat-cell *matCellDef="let supplyItem">{{supplyItem.elementItemUnitOfMeasure}}</td>
            </ng-container>

            <ng-container matColumnDef="totalQuantity">
                <th mat-header-cell *matHeaderCellDef>Ukupna kolicina</th>
                <td mat-cell *matCellDef="let supplyItem">
                    {{supplyItem.totalQuantity}}
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let productionItem; columns: displayedColumns" class="example-element-row">
            </tr>

        </table>
    </div>
</div>
}
